trigger:
- main

pool:
  vmImage: 'windows-latest'

# Versioning with counter
# see "Run and build numbers" in Microsoft documentation
# Usage, see below: $(Build.BuildNumber)
name: 1.0.$(Rev:.r)

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore
  displayName: 'Restore packages'

- script: dotnet build --configuration Release
  displayName: 'Build project'

- script: dotnet test --configuration Release
  displayName: 'Run tests'

# Pack with pipeline-driven version
- script: dotnet pack --configuration Release --output $(Build.ArtifactStagingDirectory) /p:PackageVersion=$(Build.BuildNumber)
  displayName: 'Pack NuGet'

- task: NuGetAuthenticate@1

- script: dotnet nuget push $(Build.ArtifactStagingDirectory)\*.nupkg --source "MyFeed" --api-key AzureDevOps
  displayName: 'Push to Azure Artifacts'
